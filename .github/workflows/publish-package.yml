name: Publish Package

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build and optionally publish
        required: false
        default: main
      publish_to_npm:
        description: Publish to npm after building and verifying the runner matrix
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-package-${{ github.event.inputs.ref || github.ref_name }}
  cancel-in-progress: false

jobs:
  build-runner:
    name: Build runner ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64-gnu
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: git-host-actions-runner-linux-x64-gnu
          - name: linux-arm64-gnu
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: git-host-actions-runner-linux-arm64-gnu
          - name: darwin-arm64
            os: macos-14
            target: aarch64-apple-darwin
            binary: git-host-actions-runner-darwin-arm64
          - name: darwin-x64
            os: macos-15-intel
            target: x86_64-apple-darwin
            binary: git-host-actions-runner-darwin-x64

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Actions runner
        run: node ./scripts/build/runner.mjs --target ${{ matrix.target }}

      - name: Upload Actions runner
        uses: actions/upload-artifact@v4
        with:
          name: runner-${{ matrix.name }}
          path: native/${{ matrix.binary }}
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_to_npm == 'true')
    needs: build-runner
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Verify pushed tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_NAME="${GITHUB_REF_NAME}"
          EXPECTED_TAG="v${PKG_VERSION}"
          if [ "$TAG_NAME" != "$EXPECTED_TAG" ]; then
            echo "release tag $TAG_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Verify manual publish ref version
        if: github.event_name == 'workflow_dispatch'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "manual publish for ref '${{ github.event.inputs.ref }}' with package version ${PKG_VERSION}"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download Actions runner binaries
        uses: actions/download-artifact@v4
        with:
          path: runner-artifacts

      - name: Collect runner binaries
        run: |
          mkdir -p native
          find runner-artifacts -type f -exec cp {} native/ \;
          chmod +x native/*

      - name: Verify collected runners
        run: ls -la native

      - name: Test and build package
        run: |
          bun run typecheck
          bun test
          bun run build

      - name: Verify packed release contents
        env:
          GIT_HOST_VERIFY_RUNNER_SCOPE: matrix
        run: bun run verify:pack

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
