name: Package publish
on:
  workflow_dispatch:
    inputs:
      publish:
        type: boolean
        default: false
      target_ref:
        type: string
        required: true
  push:
    tags:
      - v*
env:
  BUILD_DIR: dist
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - linux
          - darwin
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install
        run: bun install --frozen-lockfile
      - name: Build
        run: |
          mkdir -p "${BUILD_DIR}"
          printf '%s\n' "${{ matrix.target }}" > "${BUILD_DIR}/${{ matrix.target }}.txt"
      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.target }}
          path: dist/${{ matrix.target }}.txt

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref_name != '' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-linux
          path: publish-assets
      - name: Publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          test -n "${NPM_TOKEN}"
          ls -R publish-assets
          printf 'publishing from %s\n' "${{ github.ref }}"
      - uses: actions/publish-release-asset@v1
        with:
          name: mytool-linux-x64
          path: publish-assets
          format: tar.gz
